<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        a {

            background: #69c;
            color: #fff;
            padding: 1px 5px;
            text-decoration: none;
        }
        a:visited {
            color: black;
        }
        a:hover {
            background-color: rgba(102, 153, 204, 0.5);
        }

        a::after {
            content: ' [link]';
            text-decoration: none;
            color: azure;
            font-weight: normal;
            font-style: italic;

        }
    </style>
</head>
<body>
    <h1>Personalizando links!</h1>
    <ul>
        <li><a href="https://github.com/dev-kadu" target="_blank">Repositorio do Github</a></li>
        <li><a href="https://www.youtube.com/@tftkadu" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://kodolabs.com.br/" target="_blank">Site do Kodo Labs</a></li>
    </ul>
</body>
</html>
