<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos</title>
</head>
<body>
    <h1>Paragrafos e quebra de linhas</h1>
    <hr>
    <p>Voce pode escrever um 
        paragrafo de qualquer 
        jeito basta escrever 
        entre o par de tags  &lt;p&gt; e &lt;/p&gt; </p> <!-- LESS THAN / GREATER THAN-->
    <p>Se voce precisar quebra o texto em <br>qualquer lugar use a tag &lt;br&gt; </p>
    <p>Vamos adicionar alguns simbolos especiais:<br>
        &reg;
        &copy;
        &trade;
        &euro;
        &cent;
        &yen;
        &Delta;
        &delta;
        &uarr;
        &ucirc;</p>
    <p>Vamos adicionar alguns emojis:<br> <!--site para encontrar emojis www.emojipedia.org-->
        &#x1FAE0;
        &#x1FAF6;
    </p>
</body>
</html>
