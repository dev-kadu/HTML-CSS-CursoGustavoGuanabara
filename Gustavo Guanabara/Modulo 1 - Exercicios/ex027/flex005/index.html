<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            background-color: indianred;

            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
        }
        main {
            background-color: darkolivegreen;
            width: 90vw;
            height: 90vh;
            display: flex;            
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;

        }
        section {
            background-color: darkcyan;
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>Login</h1>
        </section>
    </main>
</body>
</html>
