<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: darksalmon;
            
            display: flex;
            flex-flow: row wrap;
        }

        div.item {
            background-color: lightseagreen;
            border: 1px solid black;

            text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">A</div>
        <div class="item">conteudo maior</div>
        <div class="item">C</div>
        <div class="item">Conteudo maior ainda</div>
        <div class="item">E</div>
        <div class="item">Conteudo maior ainda que é grandao
            xd
        </div>
        <div class="item">G</div>
    </div>
</body>
</html>
