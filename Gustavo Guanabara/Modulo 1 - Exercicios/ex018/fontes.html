<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com  o Google Fontes</title>

        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 1em;
            color: black;
        }
        h1 {
            font-family: Roboto Mono;
        }
    </style>
</head>
